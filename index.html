<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZailTrack - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 px-3 py-4">
    <div class="container" style="max-width: 440px;">
        <div class="card card-custom p-4 p-md-5 fade-in">
            <div class="text-center mb-4">
                <div class="display-6 mb-2">🖤</div>
                <h2 class="fw-bold mb-2">ZailTrack</h2>
                <p class="small text-muted mb-0">Pencatat keuangan pribadi dengan tampilan premium dan ringan.</p>
            </div>

            <div id="loginArea">
                <form id="loginForm" novalidate>
                    <div class="mb-3">
                        <label class="form-label small text-muted">Username</label>
                        <input type="text" class="form-control" id="logUser" autocomplete="username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small text-muted">Password</label>
                        <input type="password" class="form-control" id="logPass" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-premium w-100 py-2">Masuk</button>
                </form>
                <p class="text-center small text-muted mt-3 mb-0">Belum punya akun? <a href="#" id="switchToRegister" class="text-white fw-semibold">Daftar</a></p>
            </div>

            <div id="registerArea" class="d-none">
                <form id="regForm" novalidate>
                    <div class="mb-3">
                        <label class="form-label small text-muted">Username Baru</label>
                        <input type="text" class="form-control" id="regUser" autocomplete="username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small text-muted">Password</label>
                        <input type="password" class="form-control" id="regPass" autocomplete="new-password" required>
                    </div>
                    <button type="submit" class="btn btn-premium w-100 py-2">Buat Akun</button>
                </form>
                <p class="text-center small text-muted mt-3 mb-0">Sudah punya akun? <a href="#" id="switchToLogin" class="text-white fw-semibold">Login</a></p>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        function switchForm() {
            document.getElementById('loginArea').classList.toggle('d-none');
            document.getElementById('registerArea').classList.toggle('d-none');
        }

        document.getElementById('switchToRegister').addEventListener('click', function (event) {
            event.preventDefault();
            switchForm();
        });

        document.getElementById('switchToLogin').addEventListener('click', function (event) {
            event.preventDefault();
            switchForm();
        });
    </script>
</body>
</html>
